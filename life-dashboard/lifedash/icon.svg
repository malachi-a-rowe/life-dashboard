<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#F5F0E8"/>
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none" stroke="#8A7060" stroke-width="6"/>
  <!-- upward trajectory: small marks climbing, the compounding-growth motif -->
  <g stroke="#566E48" stroke-width="22" stroke-linecap="round" fill="none">
    <line x1="150" y1="360" x2="150" y2="330"/>
    <line x1="215" y1="360" x2="215" y2="292"/>
    <line x1="280" y1="360" x2="280" y2="248"/>
    <line x1="345" y1="360" x2="345" y2="196"/>
  </g>
  <!-- rising line connecting the tops -->
  <polyline points="150,318 215,280 280,236 345,184"
            fill="none" stroke="#7A9E68" stroke-width="12"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- north star / target dot at the peak -->
  <circle cx="345" cy="184" r="24" fill="#C8A878"/>
  <circle cx="345" cy="184" r="24" fill="none" stroke="#201408" stroke-width="6"/>
  <!-- baseline -->
  <line x1="132" y1="392" x2="380" y2="392" stroke="#8A7060" stroke-width="10" stroke-linecap="round"/>
</svg>
